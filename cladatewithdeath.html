<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>A Date with Death</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html { background: #444; font-family: sans-serif; }
    body, html { overscroll-behavior: none; margin: 0; padding: 0; overflow: hidden; }
    #canvas, #overlayDiv { position: absolute; top: 0px; left: 0px; width: 100%; height: 100%; border: 0 none; }
    #canvas { background: #000; }
    .visible { visibility: visible; opacity: 1.0; transition: opacity .1s linear; }
    .hidden { visibility: hidden; opacity: 0; transition: visibility 0s .25s, opacity .25s linear; }
    #statusDiv { 
        background: rgba(0, 0, 0, 0.85); 
        width: 60%; margin: auto; min-width: 340px; padding: 20px; 
        position: absolute; top: 20%; left: 0; right: 0; 
        border-radius: 10px; color: #eee; text-align: center; z-index: 100;
    }
    #statusProgress { width: 100%; height: 25px; margin-top: 10px; }
    #presplash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>

  <img id="presplash" src="web-presplash.jpg">

  <div id="statusDiv" class="visible">
    <div id="statusTextDiv">Initializing Download...</div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <script>
 
    const GITHUB_BASE = "https://cdn.jsdelivr.net/gh/shayderrr/newports@77c469d583759817a3cdf97330fd1545f0a46f24/ADatewithDeath-2.4-web/";
    
    const FILE_CONFIG = {
        
        zip: { base: "game.zip.part", count: 100, pad: 3 }, 
        wasm: { base: "renpy.wasm.part", count: 2, pad: 0 }
    };

    async function fetchAndMerge(config, label) {
        const chunks = [];
        const progressElement = document.getElementById('statusProgress');
        const textElement = document.getElementById('statusTextDiv');

        for (let i = 1; i <= config.count; i++) {
            const suffix = config.pad > 0 ? i.toString().padStart(config.pad, '0') : i.toString();

            const url = GITHUB_BASE + config.base + suffix;
            
            textElement.innerText = `Downloading ${label} (${i}/${config.count})...`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Could not download ${url}. Check if the file exists on GitHub.`);
            
            chunks.push(await response.arrayBuffer());
            
           
            const totalParts = FILE_CONFIG.zip.count + FILE_CONFIG.wasm.count;
            const currentPart = (label === 'Engine' ? i : FILE_CONFIG.wasm.count + i);
            progressElement.value = (currentPart / totalParts) * 100;
        }
        return new Blob(chunks);
    }

    async function bootstrap() {
        try {
         
            const wasmBlob = await fetchAndMerge(FILE_CONFIG.wasm, "Engine");
            const wasmArrayBuffer = await wasmBlob.arrayBuffer();
            
            
            const zipBlob = await fetchAndMerge(FILE_CONFIG.zip, "Game Files");
            const zipURL = URL.createObjectURL(zipBlob);

        
            window.gameZipURL = zipURL;
            window.Module = {
                wasmBinary: wasmArrayBuffer,
                print: console.log,
                printErr: console.error,
              
                locateFile: (path) => {
                    if (path.endsWith(".wasm")) return ""; 
                    return GITHUB_BASE + path;
                }
            };

    
            console.log("Loading core scripts...");
            await loadScript(GITHUB_BASE + "renpy-pre.js");
            await loadScript(GITHUB_BASE + "renpy.js");

           
            setTimeout(() => {
                document.getElementById('statusDiv').classList.add('hidden');
            }, 1000);

        } catch (e) {
            document.getElementById('statusTextDiv').style.color = "#ff6666";
            document.getElementById('statusTextDiv').innerText = "FATAL ERROR: " + e.message;
            console.error(e);
        }
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = (err) => reject(new Error("Failed to load script: " + src));
            document.body.appendChild(s);
        });
    }

    // Launch
    bootstrap();
  </script>
</body>
</html>
